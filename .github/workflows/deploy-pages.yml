name: Deploy Site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: slides-reveal.js/package-lock.json

      - name: Install Node dependencies
        working-directory: slides-reveal.js
        timeout-minutes: 5
        run: npm ci

      - name: Install pandoc and LaTeX
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pandoc \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-science \
            texlive-fonts-extra \
            lmodern

      # ── Directory scaffold ──────────────────────────────────────────────
      - name: Assemble site
        run: |
          mkdir -p _site/presentation/node_modules/reveal.js/dist/theme
          mkdir -p _site/presentation/node_modules/reveal.js/plugin/zoom
          mkdir -p _site/presentation/node_modules/reveal.js/plugin/notes
          mkdir -p _site/docs
          mkdir -p _site/paper

          # ── Copy existing pitch-deck PDF (used by "Presentation Slides" card) ──
          cp "Geometric_SAE_Invariance v1.pdf" "_site/Geometric_SAE_Invariance v1.pdf"

          # ── Compile arXiv-style PDF from the primary manuscript ──────────
          echo "Compiling arXiv-style paper PDF..."
          pandoc Krampis-SyntheticLLMs-2026.md \
            --metadata-file=paper-meta.yaml \
            --pdf-engine=pdflatex \
            -H arxiv-preamble.tex \
            --from=markdown+tex_math_dollars \
            --number-sections \
            -o _site/paper.pdf
          echo "PDF compiled successfully"

          # ── Reveal.js presentation (served under /presentation/) ─────────
          cp slides-reveal.js/semantic-constraints-presentation.html \
             _site/presentation/index.html

          cp slides-reveal.js/node_modules/reveal.js/dist/reset.css \
             _site/presentation/node_modules/reveal.js/dist/
          cp slides-reveal.js/node_modules/reveal.js/dist/reveal.css \
             _site/presentation/node_modules/reveal.js/dist/
          cp slides-reveal.js/node_modules/reveal.js/dist/reveal.js \
             _site/presentation/node_modules/reveal.js/dist/
          cp slides-reveal.js/node_modules/reveal.js/dist/theme/league.css \
             _site/presentation/node_modules/reveal.js/dist/theme/
          cp slides-reveal.js/node_modules/reveal.js/plugin/zoom/zoom.js \
             _site/presentation/node_modules/reveal.js/plugin/zoom/
          cp slides-reveal.js/node_modules/reveal.js/plugin/notes/notes.js \
             _site/presentation/node_modules/reveal.js/plugin/notes/

          # ── Light-theme CSS for docs (matches main site style) ───────────
          cat > /tmp/doc-style.html << 'STYLEEOF'
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
          <script>
            MathJax = {
              tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
              },
              options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'] }
            };
          </script>
          <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
          <style>
            * { box-sizing: border-box; }
            html { font-size: 12pt; }
            body {
              font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
              max-width: 820px; margin: 2rem auto; padding: 0 1.5rem;
              color: #222; background: #fff; line-height: 1.75; font-size: 1rem;
            }
            h1 { font-size: 1.8rem; font-weight: 700; color: #111;
                 border-bottom: 1px solid #EDEDED; padding-bottom: 0.5rem; margin-top: 2rem; }
            h2 { font-size: 1.4rem; font-weight: 600; color: #111; margin-top: 2rem; }
            h3 { font-size: 1.1rem; font-weight: 600; color: #333; margin-top: 1.5rem; }
            a { color: #0071BC; text-decoration: none; }
            a:hover { text-decoration: underline; }
            p { margin: 0.75rem 0; }
            code {
              font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
              font-size: 0.875em; background: #f5f5f5; border-radius: 4px;
              padding: 0.15em 0.4em; border: 1px solid #e0e0e0;
            }
            pre {
              background: #f8f8f8; padding: 1em 1.25em; border-radius: 6px;
              overflow-x: auto; border: 1px solid #e8e8e8; margin: 1.25rem 0;
            }
            pre code { padding: 0; background: none; border: none; font-size: 0.85em; }
            blockquote {
              border-left: 3px solid #0071BC; margin: 1.25rem 0;
              padding: 0.5rem 1rem; background: #f0f7ff; border-radius: 0 4px 4px 0;
              color: #444;
            }
            table { border-collapse: collapse; width: 100%; margin: 1.25rem 0; font-size: 0.9rem; }
            th, td { border: 1px solid #e0e0e0; padding: 0.5em 0.85em; text-align: left; }
            th { background: #f5f5f5; font-weight: 600; color: #333; }
            tr:nth-child(even) td { background: #fafafa; }
            img { max-width: 100%; border-radius: 4px; }
            hr { border: none; border-top: 1px solid #EDEDED; margin: 2rem 0; }
            strong { color: #111; }
          </style>
          STYLEEOF

          # ── Shared back-nav for doc pages ────────────────────────────────
          cat > /tmp/doc-nav.html << 'NAVEOF'
          <nav style="margin-bottom: 2rem; padding-bottom: 0.75rem; border-bottom: 1px solid #EDEDED;
                      font-family: 'DM Sans', sans-serif; font-size: 0.875rem;">
            <a href="../" style="color: #0071BC; text-decoration: none;">&#8592; Home</a>
            &nbsp;&nbsp;|&nbsp;&nbsp;
            <a href="./" style="color: #0071BC; text-decoration: none;">&#8593; Docs index</a>
          </nav>
          NAVEOF

          # ── Shared back-nav for paper section ────────────────────────────
          cat > /tmp/paper-nav.html << 'PAPERNAVEOF'
          <nav style="margin-bottom: 2rem; padding-bottom: 0.75rem; border-bottom: 1px solid #EDEDED;
                      font-family: 'DM Sans', sans-serif; font-size: 0.875rem;">
            <a href="../" style="color: #0071BC; text-decoration: none;">&#8592; Home</a>
            &nbsp;&nbsp;|&nbsp;&nbsp;
            <a href="./" style="color: #0071BC; text-decoration: none;">&#8593; Paper index</a>
          </nav>
          PAPERNAVEOF

          # ── Convert markdown docs to HTML ────────────────────────────────
          echo "Looking for markdown files in texts-md directory..."
          mapfile -t md_files < <(find texts-md -maxdepth 1 -name "*.md" -type f | sort)
          echo "Found ${#md_files[@]} markdown files"
          for md in "${md_files[@]}"; do
            base=$(basename "$md" .md)
            [ "$base" = "universality-references" ] && continue
            pandoc "$md" \
              --standalone \
              --from=markdown+tex_math_dollars \
              --metadata title="${base//-/ }" \
              --highlight-style=kate \
              -H /tmp/doc-style.html \
              -B /tmp/doc-nav.html \
              -o "_site/docs/${base}.html"
            echo "Converted: $base"
          done

          # ── Docs index page (light theme) ────────────────────────────────
          cat > _site/docs/index.html << 'DOCSEOF'
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Research Documents</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html { font-size: 12pt; }
    body {
      font-family: 'DM Sans', sans-serif;
      max-width: 820px; margin: 2rem auto; padding: 0 1.5rem;
      color: #222; background: #fff; line-height: 1.75;
    }
    h1 { font-size: 1.8rem; font-weight: 700; color: #111;
         border-bottom: 1px solid #EDEDED; padding-bottom: 0.5rem; margin-bottom: 1.5rem; }
    nav { margin-bottom: 1.5rem; padding-bottom: 0.75rem;
          border-bottom: 1px solid #EDEDED; font-size: 0.875rem; }
    a { color: #0071BC; text-decoration: none; }
    a:hover { text-decoration: underline; }
    ul { list-style: none; padding: 0; margin: 0; }
    li { padding: 0.65rem 0.5rem; border-bottom: 1px solid #EDEDED;
         display: flex; align-items: center; gap: 0.5rem; }
    li:last-child { border-bottom: 0; }
    li::before { content: ""; display: inline-block; width: 6px; height: 6px;
                 border-radius: 50%; background: #0071BC; flex-shrink: 0; }
    li a { font-size: 1rem; color: #0071BC; }
  </style>
</head>
<body>
  <nav><a href="../">&#8592; Home</a></nav>
  <h1>Research Documents</h1>
  <ul>
DOCSEOF

          for md in "${md_files[@]}"; do
            base=$(basename "$md" .md)
            [ "$base" = "universality-references" ] && continue
            label="${base//-/ }"
            echo "    <li><a href=\"${base}.html\">${label}</a></li>" \
              >> _site/docs/index.html
          done

          cat >> _site/docs/index.html << 'DOCSEOF'
  </ul>
</body>
</html>
DOCSEOF

          # ── Research Paper (convert primary manuscript) ───────────────────
          pandoc Krampis-SyntheticLLMs-2026.md \
            --standalone \
            --from=markdown+tex_math_dollars \
            --metadata title="Geometric Feature Invariance in SAEs" \
            --highlight-style=kate \
            -H /tmp/doc-style.html \
            -B /tmp/paper-nav.html \
            -o "_site/paper/index.html"
          echo "Converted primary manuscript to HTML"

          # Also convert the Mar03 paper if present
          [ -f "Krampis-Mar03-2026.md" ] && pandoc "Krampis-Mar03-2026.md" \
            --standalone \
            --from=markdown+tex_math_dollars \
            --metadata title="Geometric Feature Invariance in SAEs (v1)" \
            --highlight-style=kate \
            -H /tmp/doc-style.html \
            -B /tmp/paper-nav.html \
            -o "_site/paper/Krampis-Mar03-2026.html"

          # ── Landing page ──────────────────────────────────────────────────
          cp index.html _site/index.html

          # Prevent GitHub Pages from running Jekyll
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
